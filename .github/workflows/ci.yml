name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14
    env:
      QT_QPA_PLATFORM: ${{ matrix.os == 'ubuntu-latest' && 'offscreen' || '' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg mpv fonts-dejavu-core

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          brew install ffmpeg mpv

      - name: Install Windows system dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install ffmpeg mpv -y --no-progress

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          pytest -q

  package-smoke:
    name: Package Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install macOS build dependencies
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pillow

      - name: Install Windows build dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build packaged app on macOS
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --clean --noconfirm build_resources/video_diff_tool.spec

      - name: Build packaged app on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm build_resources/video_diff_tool.spec

      - name: Verify macOS bundle
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          test -d "dist/VideoDiffTool.app"

      - name: Verify Windows bundle
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/VideoDiffTool/VideoDiffTool.exe")) {
            throw "Expected packaged executable at dist/VideoDiffTool/VideoDiffTool.exe"
          }
