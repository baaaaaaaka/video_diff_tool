name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release, for example v1.4.0 or v1.4.0-rc2"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: VideoDiffTool
  PYTHON_VERSION: "3.11"
  SPEC_PATH: build_resources/video_diff_tool.spec

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a semantic version tag like v1.4.0 or v1.4.0-rc2, got: ${tag}" >&2
            exit 1
          fi

          git rev-parse "${tag}^{commit}" >/dev/null
          version="${tag#v}"
          prerelease="false"
          if [[ "${tag}" == *-* ]]; then
            prerelease="true"
          fi

          app_version=$(python -c 'from pathlib import Path; import re; content = Path("src/app_metadata.py").read_text(encoding="utf-8"); match = re.search(r"^APP_VERSION = \"([^\"]+)\"$", content, re.MULTILINE); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("APP_VERSION not found in src/app_metadata.py")))')

          if [[ "${app_version}" != "${version}" ]]; then
            echo "Version string in src/app_metadata.py does not match tag ${tag}" >&2
            exit 1
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14
    env:
      QT_QPA_PLATFORM: ${{ matrix.os == 'ubuntu-latest' && 'offscreen' || '' }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg mpv fonts-dejavu-core

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          brew install ffmpeg mpv

      - name: Install Windows system dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install ffmpeg mpv -y --no-progress

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          pytest -q

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: prepare
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg mpv fonts-dejavu-core

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run coverage suite
        shell: bash
        run: |
          set -euo pipefail
          pytest --cov=src --cov-report=term-missing --cov-fail-under=75

  build-macos:
    name: Build macOS arm64
    runs-on: macos-14
    needs:
      - prepare
      - test
      - coverage
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install ffmpeg
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt av==17.0.0 pyinstaller pillow

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --clean --noconfirm "${SPEC_PATH}"

      - name: Smoke test macOS bundle
        shell: bash
        run: |
          set -euo pipefail
          ffmpeg -y -f lavfi -i color=c=black:s=320x180:r=2:d=1 sample.mp4
          "dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}" --smoke-check --smoke-video sample.mp4

      - name: Package macOS artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="${APP_NAME}-${{ needs.prepare.outputs.release_tag }}-macos-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "${artifact}"
          echo "artifact=${artifact}" >> "${GITHUB_ENV}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ${{ env.artifact }}
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs:
      - prepare
      - test
      - coverage
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt av==17.0.0 pyinstaller

      - name: Build app bundle
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm "${env:SPEC_PATH}"

      - name: Smoke test Windows bundle
        shell: pwsh
        run: |
          ffmpeg -y -f lavfi -i color=c=black:s=320x180:r=2:d=1 sample.mp4
          & "dist/${env:APP_NAME}/${env:APP_NAME}.exe" --smoke-check --smoke-video sample.mp4

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $artifact = "${env:APP_NAME}-${{ needs.prepare.outputs.release_tag }}-windows-x64.zip"
          if (Test-Path $artifact) {
            Remove-Item $artifact -Force
          }
          Compress-Archive -Path "dist/${env:APP_NAME}" -DestinationPath $artifact
          "artifact=$artifact" >> $env:GITHUB_ENV

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ${{ env.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          repo="${GITHUB_REPOSITORY}"
          prerelease="${{ needs.prepare.outputs.prerelease }}"
          mapfile -d '' assets < <(find release-assets -type f -name '*.zip' -print0 | sort -z)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No packaged release assets found." >&2
            exit 1
          fi

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            if [[ "${prerelease}" == "true" ]]; then
              gh release edit "${tag}" --repo "${repo}" --prerelease
            fi
            gh release upload "${tag}" "${assets[@]}" --repo "${repo}" --clobber
          else
            if [[ "${prerelease}" == "true" ]]; then
              gh release create "${tag}" "${assets[@]}" --repo "${repo}" --title "${tag}" --generate-notes --prerelease
            else
              gh release create "${tag}" "${assets[@]}" --repo "${repo}" --title "${tag}" --generate-notes
            fi
          fi
